services:
  invoice-tool:
    build: .
    image: invoice-tool:latest
    container_name: invoice-tool
    restart: unless-stopped
    ports:
      - "8088:8000"
    environment:
      SECRET_KEY: "change-this-long-random-secret"
      ADMIN_EMAIL: "delanochen@gmail.com"
      ADMIN_PASSWORD: "1qaz@WSX"
      SHARED_PHOTOS_DIR: "/app/shared-photos"
      GOOGLE_MAPS_BROWSER_API_KEY: "${GOOGLE_MAPS_BROWSER_API_KEY:-}"
      GOOGLE_GEOCODING_API_KEY: "${GOOGLE_GEOCODING_API_KEY:-}"
    volumes:
      - ./data:/app/data
      - "/volume2/TeamFolder/PrasinosPower/甲方-三河同飞制冷股份有限公司/pictures:/app/shared-photos:ro"
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: invoice-tool-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}"
    depends_on:
      - invoice-tool

  photo-worker:
    build: .
    image: invoice-tool:latest
    container_name: invoice-tool-photo-worker
    restart: unless-stopped
    command: python photo_worker.py
    mem_limit: 768m
    environment:
      SHARED_PHOTOS_DIR: "/app/shared-photos"
      PHOTO_WORKER_INTERVAL_SECONDS: "60"
      PHOTO_WORKER_STABLE_SECONDS: "120"
      PHOTO_WORKER_BATCH_SIZE: "10"
      PHOTO_BACKUP_DAYS: "7"
    volumes:
      - "/volume2/TeamFolder/PrasinosPower/甲方-三河同飞制冷股份有限公司/pictures:/app/shared-photos"
