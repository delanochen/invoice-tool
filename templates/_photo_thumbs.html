{% if photos %}
  <div class="thumb-grid">
    {% for photo in photos %}
      <figure class="photo-thumb">
        <a href="{{ url_for('preview_report_attachment', attachment_id=photo.id) }}" target="_blank">
          <img src="{{ url_for('preview_report_attachment', attachment_id=photo.id) }}" alt="{{ photo.original_filename }}">
        </a>
        <figcaption>{{ photo.original_filename }}</figcaption>
        <button
          class="danger small delete-photo"
          type="submit"
          form="serviceReportForm"
          formaction="{{ url_for('delete_report_attachment', attachment_id=photo.id) }}"
          formmethod="post"
          formnovalidate
          onclick="return confirm('确定删除这张照片吗？');"
        >删除</button>
      </figure>
    {% endfor %}
  </div>
{% endif %}
