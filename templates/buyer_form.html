{% extends "base.html" %}
{% block title %}编辑站点 - 发票工具{% endblock %}
{% block content %}
  <header class="page-header">
    <div><p class="eyebrow">Sites</p><h1>编辑站点</h1></div>
    <button type="button" onclick="window.location.href='{{ url_for('buyers') }}'">返回站点列表</button>
  </header>
  <form method="post" class="panel form-stack narrow-form">
    {% if not is_external_manager() %}
      <label>所属客户
        <select name="client_id">
          <option value="">未指定</option>
          {% for client in clients %}
            <option value="{{ client.id }}" {% if buyer.client_id == client.id %}selected{% endif %}>{{ client.client_number }} · {{ client.name }}</option>
          {% endfor %}
        </select>
      </label>
    {% endif %}
    <label>编号 <input name="buyer_number" value="{{ buyer.buyer_number }}" required></label>
    <label>国家
      <select name="country_code" required>
        {% for country in countries %}
          <option value="{{ country.code }}" {% if (buyer.country_code or 'US') == country.code %}selected{% endif %}>{{ country.region_name }} · {{ country.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>站点名称 <input name="name" value="{{ buyer.name }}" required></label>
    <label>业主
      <select name="owner_id">
        {% for owner in owners %}
          <option value="{{ owner.id }}" {% if buyer.owner_id == owner.id %}selected{% endif %}>{{ owner.owner_number }} · {{ owner.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>联系人 <input name="contact_name" value="{{ buyer.contact_name or '' }}"></label>
    <label>联系方式 <input name="contact_details" value="{{ buyer.contact_details or '' }}"></label>
    <label>电子邮箱地址 <input type="email" name="email" value="{{ buyer.email or '' }}"></label>
    <label>规模 <input name="site_size" value="{{ buyer.site_size or '' }}"></label>
    <label>详细地址 <textarea name="detailed_address" rows="5" required>{{ buyer.detailed_address or '' }}</textarea></label>
    <label>配套机厂家 <input name="equipment_manufacturer" value="{{ buyer.equipment_manufacturer or '' }}"></label>
    <div class="form-actions"><button class="primary" type="submit">保存修改</button></div>
  </form>
{% endblock %}
