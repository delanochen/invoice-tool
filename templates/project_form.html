{% extends "base.html" %}
{% block title %}编辑项目 - 发票工具{% endblock %}
{% block content %}
  <header class="page-header">
    <div><p class="eyebrow">Projects</p><h1>编辑项目</h1></div>
    <button type="button" onclick="window.location.href='{{ url_for('projects') }}'">返回项目列表</button>
  </header>
  <form method="post" class="panel form-stack narrow-form">
    <label>项目名称 <input name="name" value="{{ project.name }}" required></label>
    <label>项目类型
      <select name="project_type">
        <option value="invoice" {% if project.project_type == "invoice" %}selected{% endif %}>发票项目</option>
        <option value="expense" {% if project.project_type == "expense" %}selected{% endif %}>员工报销</option>
        <option value="customer_expense" {% if project.project_type == "customer_expense" %}selected{% endif %}>工单结算</option>
      </select>
    </label>
    <label>单价 <input name="unit_price" type="number" step="0.01" min="0" value="{{ project.unit_price }}"></label>
    <label>默认金额 <input name="default_amount" type="number" step="0.01" min="0" value="{{ project.default_amount }}"></label>
    <label>税率 % <input name="tax_rate" type="number" step="0.01" min="0" value="{{ project.tax_rate }}" required></label>
    <label>状态
      <select name="is_active">
        <option value="1" {% if project.is_active %}selected{% endif %}>启用</option>
        <option value="0" {% if not project.is_active %}selected{% endif %}>停用</option>
      </select>
    </label>
    <div class="form-actions"><button class="primary" type="submit">保存修改</button></div>
  </form>
{% endblock %}
