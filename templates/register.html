{% extends "base.html" %}
{% block title %}注册 - 发票工具{% endblock %}
{% block content %}
  <form method="post" class="login-card">
    <img class="login-logo" src="{{ url_for('static', filename='logo.svg') }}" alt="Prasinos Power LLC logo">
    <h1>外部账号注册</h1>
    <label>姓名 <input name="name" required></label>
    <label>邮箱 <input type="email" name="email" required></label>
    <label>密码 <input type="password" name="password" minlength="8" required></label>
    <button class="primary" type="submit">注册</button>
    <p class="muted-line">注册后请联系管理员绑定客户，绑定前无法创建或查询发票。</p>
    <p class="muted-line"><a href="{{ url_for('login') }}">返回登录</a></p>
  </form>
{% endblock %}
