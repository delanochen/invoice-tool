{% extends "base.html" %}
{% block title %}编辑用户 - 发票工具{% endblock %}
{% block content %}
  <header class="page-header">
    <div><p class="eyebrow">Users</p><h1>编辑用户</h1></div>
    <button type="button" onclick="window.location.href='{{ url_for('users') }}'">返回用户列表</button>
  </header>
  <form method="post" class="panel form-stack narrow-form">
    <label>姓名 <input name="name" value="{{ user.name }}" required></label>
    <label>邮箱 <input type="email" name="email" value="{{ user.email }}" {% if not can_manage %}readonly{% endif %} required></label>
    {% if can_manage %}
      <label>角色
        <select name="role">
          {% for value, label in role_options.items() %}
            <option value="{{ value }}" {% if normalized_role(user.role) == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    {% else %}
      <label>角色 <input value="{{ user.role|role_label }}" readonly></label>
    {% endif %}
    <label>新密码 <input type="password" name="password" minlength="8" placeholder="留空则不修改密码"></label>
    <div class="form-actions"><button class="primary" type="submit">保存修改</button></div>
  </form>
{% endblock %}
